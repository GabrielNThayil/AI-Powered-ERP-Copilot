# Application Properties
spring.application.name=erp-copilot
server.port=8080

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/erp_copilot}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=none # We use Flyway, so disable auto DDL
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Cache Configuration (using Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=10m

# Jackson Serialization
spring.jackson.serialization.write-dates-as-timestamps=false

# File Upload Limit (if needed)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator Endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Swagger/OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=com.example.erp

# Security (JWT secret and expiration - in production, use environment variables)
app.jwt-secret=${JWT_SECRET:your-256-bit-secret-change-in-production}
app.jwt-expiration-ms=86400000 # 24 hours

# Gemini AI Configuration
app.gemini-api-key=${GEMINI_API_KEY:your-gemini-api-key}
app.gemini-model=gemini-pro

# CORS Configuration (adjust as needed)
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Logging
logging.level.org.springframework=INFO
logging.level.com.example.erp=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE